<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ComicTrans</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="panel-shell">
      <header class="panel-header">
        <div>
          <h1>ComicTrans</h1>
          <p id="pageLabel">No page connected</p>
        </div>
        <button id="refreshButton" class="icon-button" type="button" title="Refresh page images">
          <span aria-hidden="true">R</span>
        </button>
      </header>

      <section class="settings-section">
        <label>
          <span>Backend</span>
          <input id="apiBaseInput" type="url" spellcheck="false" />
        </label>
        <div class="button-row">
          <button id="healthButton" type="button">Check</button>
          <button id="clearButton" type="button">Clear</button>
        </div>
      </section>

      <section class="status-section">
        <div id="statusText">Open a manga page, then refresh.</div>
        <progress id="progressBar" max="100" value="0" hidden></progress>
      </section>

      <section class="image-section">
        <div class="section-heading">
          <h2>Images</h2>
          <button id="processVisibleButton" type="button">Visible</button>
        </div>
        <div id="imageList" class="image-list"></div>
      </section>
    </main>
    <script src="sidepanel.js"></script>
  </body>
</html>
